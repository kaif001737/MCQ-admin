<!DOCTYPE html>
<html>
<head>
    <title>Admin Login</title>
    <style>
        body { font-family: Arial; text-align: center; background: #222; color: white; }
        form { background: #333; padding: 20px; margin: 100px auto; width: 300px; border-radius: 10px; }
        input, button { margin: 10px; padding: 10px; width: 90%; }
        button { background: #ff5722; color: white; border: none; }
    </style>
</head>
<body>

<h2>Admin Login</h2>

<form method="POST">
    <input type="text" name="username" placeholder="Admin Username" required>
    <input type="password" name="password" placeholder="Password" required>
    <button type="submit">Login</button>
</form>

</body>
</html>
